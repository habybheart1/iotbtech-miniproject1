<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-500 flex items-center min-h-screen justify-center">
    <div class="bg-white w-[400px] rounded-sm overflow-hidden">

      <div class="w-full overflow-hiddenx h-40">
          <img src="Images/t.shirt.jpg" alt="t-shirt"
             class="w-full scale-110 object-cover h-40 shadow-md">
      </div>

      <div class="p-4 space-y-2"> 

        <div class="bg-white flex justify-between items-center w-full">
          <h1 class="text-lg font-bold">Adidas Originals</h1>
          <p class="text-lg text-blue-300 font-bold text-shadow-md">$29.99</p>
        </div>
        <h2 class="text-gray-500 text-sm self-start">Men's running tshirt</h2>
        <h2 class="text-lg font-bold self-start">SIZE</h2>
        <div class="flex space-x-2">
            <button class="bg-white w-6 h-5 text-xs rounded-sm">XS</button>
            <button class="bg-white w-6 h-5 text-xs rounded-xl">S</button>
            <button class="bg-blue-700 text-white w-6 h-5 text-xs rounded-xl ring-2 ring-gray-400">M</button>
            <button class="bg-white w-6 h-5 text-xs rounded-xl">L</button>
            <button class="bg-white w-6 h-5 text-xs rounded-xl">XL</button>
        </div>
        <h2 class="text-lg font-bold self-start">COLOUR</h2>
        <div class="flex space-x-2">
            <button class="bg-gray-500 w-4 h-4 rounded-full"></button>
            <button class="bg-blue-800 w-4 h-4 rounded-full ring-2 ring-gray-400 border border-white"></button>
            <button class="bg-yellow-600 w-4 h-4 rounded-full"></button>
        </div>
        <div class="flex space-x-2">
            <button class="bg-blue-600 text-white text-xs px-4 py-2 rounded-sm mt-4 w-full hover:bg-blue-800">BUY NOW</button>
            <button class="bg-white text-blue-400 text-xs text-shadow-md  focus:ring-4 focus:ring-grey-400 px-4 py-2 rounded-sm mt-4 w-full hover:bg-gray-200 border border-grey-400">ADD TO CART</button> 
        </div>
      </div>
    </div>
</body>
</html>
