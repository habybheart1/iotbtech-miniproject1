<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
    <title>NFT Card</title>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-[hsl(221,57%,11%)] w-[400px] h-[screen] flex items-center justify-center gap-4 font-[outfit] max-w-md rounded-md">
        <div class=" relative group bg-[hsl(216,50%,16%)] w-[300px] h-[fit-content] p-5 mt-12 mb-12 ml-2 mr-2 rounded-lg justify-center items-center ">
        
                <img src="./images/image-equilibrium.jpg"
                alt="Equillibruim-Image"
                class=" relative rounded-xl mb-5 w-[250px] h-[250px] object-cover  ">

                <img src="./images/icon-view.svg" alt="Icon View" 
                class="absolute  inset-0 left-1/2 top-[31%] -translate-x-1/2 -translate-y-1/2 w-10 h-10 opacity-0 hover:opacity-50 transition duration-300 ">
              
        
            <h1 class=" text-xl text-white font-semibold mt-1 hover:cursor-pointer hover:text-cyan-400 mb-4">Equillibruim #3429</h1>
            <p class="text-[hsl(215,51%,70%)] text-sm mb-5">Our equillibruim collection promotes<br/> balance and calm </p>
            <div class="flex justify-between items-center mb-5">
                <div class="flex items-center gap-2">
        <img src="./images/icon-ethereum.svg" alt="Ethereum Icon"
        class="br-1">
        <p class="text-cyan-400 text-sm font-semibold ">
          0.041 ETH</p>
                </div>
          <div class="flex items-center gap-2">
        <img src="./images/icon-clock.svg" alt="Clock">
        <p class="text-[hsl(215,51%,70%)] text-sm">
          3 days left
        </p>
      </div>

    </div>

    <hr class="border-[hsl(215,32%,27%)] mb-4">
    <div class="flex items-center gap-4">

      <img 
        src="./images/image-avatar.png"
        alt="Avatar"
        class="w-8 border border-white rounded-full">

      <p class="text-sm text-[hsl(215,51%,70%)]">
        Creation of
        <span class="text-white hover:cursor-pointer hover:text-cyan-400">
          Jules Wyvern
        </span>
      </p>

    </div>

  </div>

</body>
</html>
